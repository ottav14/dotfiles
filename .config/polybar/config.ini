[colors]
base = #1e1e2e
mantle = #181825
surface0 = #313244
text = #cdd6f4
subtext0 = #a6adc8

blue = #89b4fa
mauve = #cba6f7
green = #a6e3a1
yellow = #f9e2af
red = #f38ba8

[bar/main]
width = 100%
height = 40 
radius = 0

background = ${colors.base}
foreground = ${colors.text}

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = JetBrainsMono Nerd Font:size=14;2

modules-left = xworkspaces
modules-right = network battery date

enable-ipc = true

[module/network]
type = internal/network
interface = wlan0
interval = 3

format-connected = net %local_ip%
format-connected-foreground = ${colors.green}

format-disconnected = net down
format-disconnected-foreground = ${colors.red}

[module/battery]
type = custom/script
exec = "cat /sys/class/power_supply/BAT0/capacity"
interval = 30
label = "%output%%"
label-foreground = #89b4fa

[module/date]
type = internal/date
interval = 5

date = %H:%M
date-alt = %Y-%m-%d %H:%M

label = %date%
label-foreground = ${colors.mauve}


